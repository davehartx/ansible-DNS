
- name: Build website Centos and Ubuntu
  hosts: all       ##   so if you add --tags bind   to the PB run  , it only runs   THIS name
  diff: true        
  check: true    #   like --check  on th playbook run  
  become: true       
  tasks:
  - name: dump facts # so  get some info in client first!
    ansible.builtin.debug:
        var: ansible_distribution #   returns this > for example"ansible_distribution": "Ubuntu",
  - name: Only run if OS is Ubuntu
    apt:
      update_cache: true  ##   aptget update  run  before bind install , equivalent to  "apt update"
      pkg:    # <<<  pkg or name
        - "nginx"
    when: ansible_distribution  == "Ubuntu"
  - name: Open ufw
    command: ufw allow 'Nginx HTTP'   # multiple
    when: ansible_distribution  == "Ubuntu"
  - name: Only run if OS is Centos
    when: ansible_distribution  == "Centos"
    yum:
      pkg:  
        - "nginx"
  - name: Make sure a service unit is runnings
    ansible.builtin.systemd_service:
      state: started
      name: nginx
  - name: create directory
    file:
      recurse: true
      state: directory
      path: /usr/share/nginx/html
  - name: copy over html
    ansible.builtin.copy:
      src: data/hello.html
      dest: /usr/share/nginx/html/index.html
  - name: copy over jpg                 ##  no likes tags 
    ansible.builtin.copy:
      src: data/download.jpg
      dest: /usr/share/nginx/html/download.jpg


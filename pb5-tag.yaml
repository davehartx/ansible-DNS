##test
- name: copy module ex
  hosts:  sys1
  tags: tuggy    # if this tag is listed   ansible-playbook files.yaml --tags  tuggy
  become: true
  tasks:    ## order is impotant
  - group:   
      name: ansible
      state: present
  - file: 
     dest: /home/ansible
     state: directory
     owner: ansible
     group: ansible
     mode: '0777'
  - copy:
     dest: /home/ansible/hello
     content: "bunnies of the world unite"
     owner: ansible
     group: ansible
     mode: '0777'
  - command: date

  